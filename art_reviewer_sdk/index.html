<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Art Reviewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  /* Transient Labs design tokens (from lab.transient.xyz, dark theme,
     terminal-green brand). Fonts hotlinked from the lab CDN — hashed
     URLs may rotate on their deploys; falls back to system sans. */
  @font-face {
    font-family: 'FK Grotesk';
    src: url('https://lab.transient.xyz/_next/static/media/FKGrotesk-Regular.126ntxfiqv.sy.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'FK Grotesk';
    src: url('https://lab.transient.xyz/_next/static/media/FKGrotesk-Medium.16p1.ga13bw~j.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'FK Grotesk';
    src: url('https://lab.transient.xyz/_next/static/media/FKGrotesk-Bold.0wv8aukhhayn9.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'FK Grotesk Mono';
    src: url('https://lab.transient.xyz/_next/static/media/FKGroteskMono-Regular.00m-k261k4r-f.otf') format('opentype');
    font-weight: 400;
  }

  :root {
    --bg: #050607;            /* tl black-intense (app background) */
    --panel: #0f1116;         /* tl black-medium (action bar / cards) */
    --panel-2: #191c24;       /* tl black-soft / neutral-950 */
    --ink: #d4d9e3;           /* tl neutral-200 */
    --ink-strong: #fafaff;    /* tl white-intense */
    --muted: #637594;         /* tl neutral-500 */
    --line: #323948;          /* tl neutral-900 */
    --green-400: #26f625;
    --green-500: #05dd08;     /* tl terminal-green-500 */
    --green-600: #00b106;     /* tl terminal-green-600 (primary button) */
    --danger: #ef4444;
    --radius: 5px;
    --sans: 'FK Grotesk', system-ui, 'Helvetica Neue', Arial, sans-serif;
    --mono: 'FK Grotesk Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 26px 32px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  header h1 {
    margin: 0;
    font-size: 19px;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--ink-strong);
  }
  header h1 em { color: var(--green-500); font-style: normal; }
  .wrap { max-width: min(1720px, 94vw); margin: 0 auto; }
  main {
    display: grid;
    grid-template-columns: 460px 1fr;
    gap: 32px;
    padding: 36px 0 48px;
    max-width: min(1720px, 94vw);
    margin: 0 auto;
    align-items: start;
  }
  @media (max-width: 980px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px;
  }
  #drop {
    border: 1px dashed var(--muted);
    border-radius: var(--radius);
    background: var(--panel-2);
    min-height: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    padding: 12px;
    transition: border-color .15s, color .15s;
    overflow: hidden;
    font-size: 14px;
  }
  #drop.dragover { border-color: var(--green-500); color: var(--green-500); }
  #drop img { max-width: 100%; max-height: 60vh; display: block; }
  label {
    display: block;
    margin: 18px 0 6px;
    font-size: 12px;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  select, input[type=number], input[type=text], textarea {
    width: 100%;
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 10px;
    font-family: var(--mono);
    font-size: 13px;
  }
  textarea {
    resize: vertical;
    min-height: 64px;
    line-height: 1.5;
  }
  select:focus, input[type=number]:focus, input[type=text]:focus, textarea:focus {
    outline: 1px solid var(--green-600);
    outline-offset: 0;
  }
  .hint { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.45; }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: var(--green-600);
    border: 0;
    border-radius: var(--radius);
    color: var(--ink-strong);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: .02em;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  button:hover:not(:disabled) { background: var(--green-500); }
  button:disabled { background: var(--panel-2); color: var(--muted); cursor: default; }
  .btn-secondary {
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover:not(:disabled) { background: var(--panel-2); border-color: var(--green-600); color: var(--ink-strong); }
  #newBtn { margin: 0 0 16px; }
  .btn-sm {
    width: auto;
    margin: 0;
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--mono);
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
  }
  .btn-sm:hover:not(:disabled) { background: var(--panel-2); border-color: var(--green-600); color: var(--ink-strong); }
  #status {
    margin-top: 12px;
    font-size: 12.5px;
    font-family: var(--mono);
    color: var(--muted);
    min-height: 18px;
  }
  #status.error { color: var(--danger); }

  /* right panel: tabs */
  #right { padding: 0; }
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    width: auto;
    margin: 0;
    padding: 14px 22px;
    background: none;
    border: 0;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: .03em;
  }
  .tab:hover:not(:disabled) { background: none; color: var(--ink); }
  .tab.active { color: var(--ink-strong); border-bottom-color: var(--green-500); }
  .tab .count { font-family: var(--mono); color: var(--muted); font-size: 12px; }
  .tabbody { padding: 28px 40px 36px; }

  /* current review */
  #out { line-height: 1.65; font-size: 15.5px; }
  #out p { max-width: 75ch; }
  #out .placeholder { color: var(--muted); }
  #out h2, #histDetailBody h2 {
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--green-500);
    border-bottom: 1px solid var(--line);
    padding-bottom: 6px;
    margin: 26px 0 10px;
    font-weight: 500;
  }
  #out h2:first-child { margin-top: 0; }
  #out strong, #histDetailBody strong { color: var(--ink-strong); font-weight: 500; }
  .modeltag {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--green-400);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    display: inline-block;
    padding: 4px 10px;
    margin-bottom: 14px;
  }
  .ctxmeta {
    font-size: 13px;
    color: var(--muted);
    margin: -6px 0 14px;
    line-height: 1.5;
  }
  .ctxmeta b { color: var(--ink-strong); font-weight: 500; }

  /* past reviews */
  .hist-head {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
    margin-bottom: 10px;
  }
  .hist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-top: 1px solid var(--line);
    cursor: pointer;
  }
  .hist-item:last-child { border-bottom: 1px solid var(--line); }
  .hist-item:hover { background: var(--panel-2); }
  .hist-item img {
    width: 48px; height: 48px;
    object-fit: cover;
    border-radius: var(--radius);
    border: 1px solid var(--line);
    flex: none;
  }
  .hist-item .meta { min-width: 0; flex: 1; }
  .hist-item .meta .m1 {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hist-item .meta .m2 { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .hist-item .verdict {
    font-family: var(--mono);
    font-size: 11.5px;
    flex: none;
    padding: 3px 8px;
    border-radius: var(--radius);
    border: 1px solid var(--line);
  }
  .verdict.acquire { color: var(--green-400); border-color: var(--green-600); }
  .verdict.pass { color: var(--muted); }
  #histEmpty { font-size: 13px; color: var(--muted); padding: 14px 0; }
  #histDetail #backBtn { margin-bottom: 16px; }
  #histDetailBody { line-height: 1.65; font-size: 15.5px; }
  #histDetailBody p { max-width: 75ch; }

  .spinner {
    display: inline-block;
    width: 11px; height: 11px;
    border: 2px solid var(--line);
    border-top-color: var(--green-500);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    vertical-align: -2px;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>I Used To Make Art For Humans — <em>Reviewer</em></h1>
  </div>
</header>
<main>
  <section class="panel">
    <button id="newBtn" class="btn-secondary">Start new review</button>
    <div id="drop" tabindex="0">
      <span id="dropHint">Drop an image here<br>or click to browse</span>
    </div>
    <input id="file" type="file" accept="image/*" hidden>

    <label for="artwork_name">Artwork name</label>
    <input id="artwork_name" type="text" placeholder="Optional — title of the work">

    <label for="artist">Artist name</label>
    <input id="artist" type="text" placeholder="Optional — the artist">

    <label for="work_type">Work type</label>
    <select id="work_type">
      <option value="" selected>Optional — not specified</option>
      <option value="Digitally native (NFT / digital asset)">Digitally native (NFT / digital asset)</option>
      <option value="Digital representation of a physical work">Digital representation of a physical work</option>
    </select>

    <label for="price">Price (USD)</label>
    <input id="price" type="text" placeholder="Optional — list price in USD, e.g. 5000">

    <label for="max_spend">Maximum spend (USD)</label>
    <input id="max_spend" type="text" placeholder="Optional — most the collector would pay for this work, e.g. 25000">

    <label for="description">Artwork description</label>
    <textarea id="description" rows="3" placeholder="Optional — medium, artist statement, context…"></textarea>

    <label for="preferences">Collector preferences</label>
    <textarea id="preferences" rows="3" placeholder="Optional — the collector's taste, what they're looking for, what to weigh…"></textarea>

    <label for="model">Model</label>
    <select id="model">
      <optgroup label="Gemini">
        <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
        <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
        <option value="gemini-2.5-pro">gemini-2.5-pro</option>
        <option value="gemini-3-pro-preview">gemini-3-pro-preview</option>
        <option value="gemini-3.5-flash">gemini-3.5-flash</option>
      </optgroup>
      <optgroup label="OpenAI">
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
        <option value="gpt-5-mini">gpt-5-mini</option>
        <option value="gpt-5.1">gpt-5.1</option>
        <option value="gpt-5.2">gpt-5.2</option>
        <option value="gpt-5.5">gpt-5.5</option>
      </optgroup>
      <optgroup label="Claude">
        <option value="claude-haiku-4-5">claude-haiku-4-5</option>
        <option value="claude-sonnet-4-6">claude-sonnet-4-6</option>
        <option value="claude-opus-4-8">claude-opus-4-8</option>
        <option value="claude-fable-5">claude-fable-5</option>
      </optgroup>
    </select>

    <label for="review_prompt">Review prompt</label>
    <select id="review_prompt">
      <option value="1" selected>review_prompt_1</option>
      <option value="2">review_prompt_2 (price-aware)</option>
    </select>

    <div class="hint">Each model runs at its own default settings.</div>

    <button id="go" disabled>Review</button>
    <div id="status"></div>
  </section>

  <section class="panel" id="right">
    <div class="tabs">
      <button class="tab active" id="tabCurrent">Current Review</button>
      <button class="tab" id="tabPast">Past Reviews <span class="count">(<span id="histCount">0</span>)</span></button>
    </div>

    <div class="tabbody" id="currentBody">
      <div id="out"><p class="placeholder">The review will appear here.</p></div>
    </div>

    <div class="tabbody" id="pastBody" hidden>
      <div id="histBrowse">
        <div class="hist-head">
          <button class="btn-sm" id="exportBtn">Export JSON</button>
          <button class="btn-sm" id="clearBtn">Clear history</button>
        </div>
        <div id="histList"></div>
        <div id="histEmpty">No reviews yet — every review is saved here automatically.</div>
      </div>
      <div id="histDetail" hidden>
        <button class="btn-sm" id="backBtn">&larr; All past reviews</button>
        <div id="histDetailBody"></div>
      </div>
    </div>
  </section>
</main>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
const go = document.getElementById('go');
const status_ = document.getElementById('status');
const out = document.getElementById('out');
let file = null;

function setFile(f) {
  if (!f || !f.type.startsWith('image/')) return;
  file = f;
  const url = URL.createObjectURL(f);
  drop.innerHTML = '<img src="' + url + '" alt="artwork">';
  go.disabled = false;
}

drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('dragover');
  setFile(e.dataTransfer.files[0]);
});
document.addEventListener('paste', e => {
  const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
  if (item) setFile(item.getAsFile());
});

const modelSel = document.getElementById('model');

// ---- tabs ----
const tabCurrent = document.getElementById('tabCurrent');
const tabPast = document.getElementById('tabPast');
const currentBody = document.getElementById('currentBody');
const pastBody = document.getElementById('pastBody');
const histBrowse = document.getElementById('histBrowse');
const histDetail = document.getElementById('histDetail');

function showTab(which) {
  const current = which === 'current';
  tabCurrent.classList.toggle('active', current);
  tabPast.classList.toggle('active', !current);
  currentBody.hidden = !current;
  pastBody.hidden = current;
  if (!current) {  // entering past tab always starts at the list
    histDetail.hidden = true;
    histBrowse.hidden = false;
  }
}
tabCurrent.addEventListener('click', () => showTab('current'));
tabPast.addEventListener('click', () => showTab('past'));

// ---- review history (localStorage) ----
const HIST_KEY = 'iutmafh_reviews';
const histList = document.getElementById('histList');
const histCount = document.getElementById('histCount');
const histEmpty = document.getElementById('histEmpty');
const histDetailBody = document.getElementById('histDetailBody');
let history = [];
try { history = JSON.parse(localStorage.getItem(HIST_KEY)) || []; } catch {}

function saveHistory() {
  // On quota overflow, drop oldest entries until it fits.
  for (;;) {
    try { localStorage.setItem(HIST_KEY, JSON.stringify(history)); return; }
    catch (e) {
      if (history.length === 0) return;
      history.pop();
    }
  }
}

// A structured review (keys/nesting match json-template.json / the server's
// tool schema): { First Impression, Interpretation, Evaluation{dim:{Score,
// Reasoning}}, Verdict{Overall Score, Decision, Rational} }. Older history
// entries may store review (or its sections) as markdown strings — the
// helpers below tolerate both shapes.
const REVIEW_SECTIONS = ['First Impression', 'Interpretation', 'Evaluation', 'Verdict'];

function esc(s) {
  return String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
}

function section(title, body) { return '<h2>' + title + '</h2>' + body; }

function renderEvaluation(ev) {
  if (typeof ev === 'string') return marked.parse(ev);  // legacy
  return Object.keys(ev).map(dim => {
    const d = ev[dim] || {};
    const score = (d.Score !== undefined && d.Score !== '') ? ' — ' + d.Score + '/10' : '';
    const reason = d.Reasoning ? '<br>' + marked.parseInline(String(d.Reasoning)) : '';
    return '<p><strong>' + esc(dim) + score + '</strong>' + reason + '</p>';
  }).join('');
}

function renderVerdict(v) {
  // Legacy: Verdict was a single markdown string with **labels** on one line.
  if (typeof v === 'string') {
    return marked.parse(String(v)
      .replace(/\s*(\*{0,2}(?:Overall score|Decision|Rationale)\b)/g, '\n\n$1')
      .replace(/^\s+/, ''));
  }
  const score = v['Overall Score'];
  const rational = v['Rational'] !== undefined ? v['Rational'] : v['Rationale'];
  let html = '';
  if (score !== undefined && score !== '') html += '<p><strong>Overall Score:</strong> ' + esc(score) + '/100</p>';
  if (v['Decision']) html += '<p><strong>Decision:</strong> ' + esc(v['Decision']) + '</p>';
  if (rational) html += '<p><strong>Rationale:</strong> ' + marked.parseInline(String(rational)) + '</p>';
  return html;
}

function renderReview(review) {
  if (typeof review === 'string') return marked.parse(review);  // legacy entries
  let html = '';
  if (review['First Impression']) html += section('First Impression', marked.parse(String(review['First Impression'])));
  if (review['Interpretation']) html += section('Interpretation', marked.parse(String(review['Interpretation'])));
  if (review['Evaluation']) html += section('Evaluation', renderEvaluation(review['Evaluation']));
  if (review['Verdict']) html += section('Verdict', renderVerdict(review['Verdict']));
  return html;
}

function parseVerdict(review) {
  // Preferred: structured Verdict object.
  const v = review && typeof review === 'object' ? review.Verdict : null;
  if (v && typeof v === 'object') {
    const decision = ((v.Decision || '').match(/ACQUIRE|PASS/i) || [''])[0].toUpperCase();
    const score = String(v['Overall Score'] ?? '').replace(/[^0-9]/g, '');
    return { decision, score };
  }
  // Fallback: scan whatever text we can find (legacy string reviews).
  const text = typeof review === 'string' ? review
    : REVIEW_SECTIONS.map(k => review && review[k] ? JSON.stringify(review[k]) : '').join('\n');
  const decision = (text.match(/Decision:?\*{0,2}\s*\*{0,2}(ACQUIRE|PASS)/i) || [])[1] || '';
  const score = (text.match(/Overall [Ss]core:?\*{0,2}\s*\*{0,2}(\d+)/i) || [])[1] || '';
  return { decision: decision.toUpperCase(), score };
}

function modelTag(e) {
  return '<div class="modeltag">' + e.model + ' · ' + e.secs + 's'
    + ' · ' + new Date(e.ts).toLocaleString() + '</div>';
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function contextMeta(e) {
  const bits = [];
  if (e.artwork_name) bits.push('<b>Artwork:</b> ' + esc(e.artwork_name));
  if (e.artist) bits.push('<b>Artist:</b> ' + esc(e.artist));
  if (e.work_type) bits.push('<b>Work type:</b> ' + esc(e.work_type));
  if (e.price) bits.push('<b>Price (USD):</b> ' + esc(e.price));
  if (e.max_spend) bits.push('<b>Maximum spend (USD):</b> ' + esc(e.max_spend));
  if (e.review_prompt) bits.push('<b>Prompt:</b> review_prompt_' + esc(e.review_prompt));
  return bits.length ? '<div class="ctxmeta">' + bits.join(' &nbsp;·&nbsp; ') + '</div>' : '';
}

function showEntry(e) {
  histDetailBody.innerHTML = modelTag(e)
    + (e.thumb ? '<img src="' + e.thumb + '" alt="" style="float:right;width:72px;height:72px;object-fit:cover;border-radius:5px;border:1px solid var(--line);margin-left:14px">' : '')
    + contextMeta(e)
    + renderReview(e.review);
  histBrowse.hidden = true;
  histDetail.hidden = false;
}

document.getElementById('backBtn').addEventListener('click', () => {
  histDetail.hidden = true;
  histBrowse.hidden = false;
});

function renderHistory() {
  histCount.textContent = history.length;
  histEmpty.style.display = history.length ? 'none' : '';
  histList.innerHTML = '';
  history.forEach((e, i) => {
    const v = parseVerdict(e.review);
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML =
      (e.thumb ? '<img src="' + e.thumb + '" alt="">' : '') +
      '<div class="meta"><div class="m1">' + e.model
        + (e.filename ? ' · ' + e.filename : '') + '</div>' +
      '<div class="m2">' + new Date(e.ts).toLocaleString()
        + (v.score ? ' · ' + v.score + '/100' : '') + '</div></div>' +
      (v.decision ? '<span class="verdict ' + v.decision.toLowerCase() + '">' + v.decision + '</span>' : '');
    item.addEventListener('click', () => showEntry(history[i]));
    histList.appendChild(item);
  });
}

function makeThumb(f) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = 96 / Math.max(img.width, img.height);
      const c = document.createElement('canvas');
      c.width = Math.max(1, Math.round(img.width * scale));
      c.height = Math.max(1, Math.round(img.height * scale));
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = () => resolve('');
    img.src = URL.createObjectURL(f);
  });
}

document.getElementById('exportBtn').addEventListener('click', () => {
  // Thumbnails are for the UI; the export carries the experiment data.
  const data = history.map(({ thumb, ...rest }) => rest);
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'art-reviews-' + new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (!history.length || !confirm('Delete all ' + history.length + ' saved reviews?')) return;
  history = [];
  saveHistory();
  renderHistory();
});

renderHistory();

// ---- start new review ----
document.getElementById('newBtn').addEventListener('click', () => {
  file = null;
  fileInput.value = '';
  drop.innerHTML = '<span id="dropHint">Drop an image here<br>or click to browse</span>';
  document.getElementById('artwork_name').value = '';
  document.getElementById('artist').value = '';
  document.getElementById('work_type').value = '';
  document.getElementById('price').value = '';
  document.getElementById('max_spend').value = '';
  document.getElementById('review_prompt').value = '1';
  document.getElementById('description').value = '';
  document.getElementById('preferences').value = '';
  go.disabled = true;
  status_.className = '';
  status_.textContent = '';
  out.innerHTML = '<p class="placeholder">The review will appear here.</p>';
  showTab('current');
});

// ---- run a review ----
go.addEventListener('click', async () => {
  const model = modelSel.value;
  const form = new FormData();
  form.append('image', file);
  form.append('model', model);
  const artworkName = document.getElementById('artwork_name').value;
  const artist = document.getElementById('artist').value;
  const workType = document.getElementById('work_type').value;
  const price = document.getElementById('price').value;
  const maxSpend = document.getElementById('max_spend').value;
  const description = document.getElementById('description').value;
  const preferences = document.getElementById('preferences').value;
  const reviewPrompt = document.getElementById('review_prompt').value;
  form.append('review_prompt', reviewPrompt);
  if (artworkName.trim() !== '') form.append('artwork_name', artworkName);
  if (artist.trim() !== '') form.append('artist', artist);
  if (workType.trim() !== '') form.append('work_type', workType);
  if (price.trim() !== '') form.append('price', price);
  if (maxSpend.trim() !== '') form.append('max_spend', maxSpend);
  if (description.trim() !== '') form.append('description', description);
  if (preferences.trim() !== '') form.append('preferences', preferences);

  go.disabled = true;
  status_.className = '';
  status_.innerHTML = '<span class="spinner"></span>Reviewing with ' + model + '…';
  const t0 = Date.now();

  try {
    const res = await fetch('/review', { method: 'POST', body: form });
    const body = await res.json();
    if (!res.ok) throw new Error(body.detail || res.statusText);

    const entry = {
      ts: Date.now(),
      model: body.model,
      filename: file.name || 'pasted-image',
      review_prompt: reviewPrompt,
      artwork_name: artworkName.trim(),
      artist: artist.trim(),
      work_type: workType.trim(),
      price: price.trim(),
      max_spend: maxSpend.trim(),
      description: description.trim(),
      preferences: preferences.trim(),
      secs: ((Date.now() - t0) / 1000).toFixed(1),
      review: body.review,
      thumb: await makeThumb(file),
    };
    history.unshift(entry);
    if (history.length > 300) history.pop();
    saveHistory();
    renderHistory();

    out.innerHTML = modelTag(entry) + contextMeta(entry) + renderReview(entry.review);
    showTab('current');
    status_.textContent = '';
  } catch (err) {
    status_.className = 'error';
    status_.textContent = err.message;
  } finally {
    go.disabled = false;
  }
});
</script>
</body>
</html>
